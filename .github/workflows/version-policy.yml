name: Version Policy

on:
  pull_request:

permissions:
  contents: read

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v5
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - name: Validate package and parent version policy
        run: |
          python3 scripts/check_version_policy.py \
            --base-ref "origin/${{ github.base_ref }}"
